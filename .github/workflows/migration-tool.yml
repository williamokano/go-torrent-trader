name: Migration Tool CI
on:
  push:
    branches: [main]
    paths: ['migration-tool/**', '.github/workflows/migration-tool.yml']
  pull_request:
    branches: [main]
    paths: ['migration-tool/**', '.github/workflows/migration-tool.yml']

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: migration-tool/go.sum
      - run: go vet ./...
        working-directory: migration-tool

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: migration-tool/go.sum
      - run: go test -race -coverprofile=coverage.out ./...
        working-directory: migration-tool

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: migration-tool/go.sum
      - run: go build -o migrate ./cmd/migrate
        working-directory: migration-tool
