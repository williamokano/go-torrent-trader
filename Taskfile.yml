version: '3'

output: prefixed

vars:
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend
  MIGRATION_TOOL_DIR: migration-tool

tasks:
  default:
    desc: Build all projects
    deps: [backend:build, frontend:build, migration-tool:build]

  # Top-level aggregate tasks
  build:
    desc: Build all projects
    deps: [backend:build, frontend:build, migration-tool:build]

  test:
    desc: Run all tests
    deps: [backend:test, frontend:test, migration-tool:test]

  lint:
    desc: Lint all projects
    deps: [backend:lint, frontend:lint]

  dev:
    desc: Start full development environment
    deps: [dev:up]
    cmds:
      - task: dev:services

  dev:services:
    desc: Start backend and frontend dev servers
    deps: [backend:dev, frontend:dev]

  dev:backend:
    desc: Start infra + backend only
    deps: [dev:up]
    cmds:
      - task: backend:dev

  dev:frontend:
    desc: Start infra + frontend only
    deps: [dev:up]
    cmds:
      - task: frontend:dev

  tools:
    desc: Install development tools (golangci-lint, air)
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
      - go install github.com/air-verse/air@latest

  dev:up:
    desc: Start infrastructure services (postgres, redis, minio, mailpit)
    cmds:
      - docker compose up -d

  dev:down:
    desc: Stop infrastructure services
    cmds:
      - docker compose down

  dev:logs:
    desc: Tail infrastructure service logs
    cmds:
      - docker compose logs -f

  dev:reset:
    desc: Stop infrastructure services and remove all volumes (fresh start)
    cmds:
      - docker compose down -v

  generate:
    desc: Run all code generation (sqlc, OpenAPI client, etc.)
    cmds:
      - echo "No generators configured yet. Add generate:sqlc, generate:api-client, etc."

  docker:build:
    desc: Build all Docker images
    cmds:
      - docker build -t torrenttrader-backend ./backend
      - docker build -t torrenttrader-frontend ./frontend
      - docker build -t torrenttrader-migrate ./migration-tool

  # Backend tasks
  backend:build:
    desc: Build the backend server
    dir: '{{.BACKEND_DIR}}'
    cmds:
      - go build -o server ./cmd/server

  backend:test:
    desc: Run backend tests
    dir: '{{.BACKEND_DIR}}'
    cmds:
      - go test ./...

  backend:lint:
    desc: Lint backend code
    dir: '{{.BACKEND_DIR}}'
    cmds:
      - golangci-lint run

  backend:dev:
    desc: Start backend with hot reload
    dir: '{{.BACKEND_DIR}}'
    cmds:
      - air

  backend:run:
    desc: Run the backend server
    dir: '{{.BACKEND_DIR}}'
    cmds:
      - go run ./cmd/server

  # Frontend tasks
  frontend:build:
    desc: Build the frontend
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - npm run build

  frontend:test:
    desc: Run frontend tests
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - npm test

  frontend:lint:
    desc: Lint frontend code
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - npm run lint

  frontend:dev:
    desc: Start frontend dev server
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - npm run dev

  frontend:install:
    desc: Install frontend dependencies
    dir: '{{.FRONTEND_DIR}}'
    cmds:
      - npm install

  # Migration tool tasks
  migration-tool:build:
    desc: Build the migration tool
    dir: '{{.MIGRATION_TOOL_DIR}}'
    cmds:
      - go build -o migrate ./cmd/migrate

  migration-tool:test:
    desc: Run migration tool tests
    dir: '{{.MIGRATION_TOOL_DIR}}'
    cmds:
      - go test ./...

  migration-tool:lint:
    desc: Lint migration tool code
    dir: '{{.MIGRATION_TOOL_DIR}}'
    cmds:
      - go vet ./...

  migration-tool:run:
    desc: Run the migration tool
    dir: '{{.MIGRATION_TOOL_DIR}}'
    cmds:
      - go run ./cmd/migrate
