openapi: 3.0.3
info:
  title: TorrentTrader API
  version: 0.2.0
  description: TorrentTrader private tracker API
servers:
  - url: http://localhost:8080
    description: Development
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Health check
      tags: [system]
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/stats:
    get:
      operationId: getStats
      summary: Get site-wide statistics
      tags: [system]
      responses:
        '200':
          description: Site statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    $ref: '#/components/schemas/SiteStats'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/categories:
    get:
      operationId: getCategories
      summary: List all torrent categories
      tags: [categories]
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/register:
    post:
      operationId: authRegister
      summary: Register a new user
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created and auto-logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      operationId: authLogin
      summary: Login with username and password
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      operationId: authRefresh
      summary: Refresh access token using refresh token
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    $ref: '#/components/schemas/AuthTokens'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      operationId: authLogout
      summary: Logout and invalidate current session
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session invalidated
        '401':
          description: Missing or invalid authorization header
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/forgot-password:
    post:
      operationId: authForgotPassword
      summary: Request a password reset link
      description: >
        Sends a password reset link to the given email if it exists.
        Always returns 200 to prevent email enumeration.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Generic success response (does not reveal if email exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/reset-password:
    post:
      operationId: authResetPassword
      summary: Reset password using a reset token
      description: >
        Validates the reset token, sets the new password, and invalidates
        all active sessions for the user.
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid or expired reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error (password too short/long)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/me:
    get:
      operationId: authMe
      summary: Get current authenticated user's full profile
      description: >
        Returns the full owner profile for the authenticated user, including
        private fields like email, masked passkey, invites, and warned status.
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user's full profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/OwnerProfile'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/{id}:
    get:
      operationId: getUserProfile
      summary: Get a user's profile
      description: >
        Returns a user's public profile. If the authenticated user is viewing
        their own profile, private fields (email, passkey, invites, warned,
        last_login) are also included.
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User profile (public or owner view)
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    oneOf:
                      - $ref: '#/components/schemas/PublicProfile'
                      - $ref: '#/components/schemas/OwnerProfile'
        '400':
          description: Invalid user ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/me/profile:
    put:
      operationId: updateProfile
      summary: Update the current user's profile
      tags: [users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/OwnerProfile'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/me/password:
    put:
      operationId: changePassword
      summary: Change the current user's password
      description: >
        Verifies the current password, sets a new one, and invalidates all
        other sessions (keeps the current session active).
      tags: [users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Current password incorrect or not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error (new password too short/long)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/me/passkey:
    post:
      operationId: regeneratePasskey
      summary: Regenerate the current user's passkey
      description: >
        Generates a new 32-character hex passkey. The old passkey is
        immediately invalidated.
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: New passkey generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  passkey:
                    type: string
                    description: The new 32-character hex passkey
                    example: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6"
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/torrents:
    post:
      operationId: uploadTorrent
      summary: Upload a new torrent
      tags: [torrents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [torrent_file, category_id]
              properties:
                torrent_file:
                  type: string
                  format: binary
                  description: The .torrent file to upload
                category_id:
                  type: integer
                  format: int64
                  description: Category ID for the torrent
                name:
                  type: string
                  description: Display name (defaults to name from .torrent file)
                description:
                  type: string
                  description: Torrent description
                anonymous:
                  type: boolean
                  default: false
                  description: Whether to hide the uploader's identity
      responses:
        '201':
          description: Torrent uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  torrent:
                    $ref: '#/components/schemas/Torrent'
        '400':
          description: Invalid torrent file or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate torrent (info_hash already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listTorrents
      summary: Browse and search torrents
      tags: [torrents]
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search term for torrent name
        - name: cat
          in: query
          schema:
            type: integer
            format: int64
          description: Filter by category ID
        - name: sort
          in: query
          schema:
            type: string
            enum: [name, created_at, size, seeders, leechers]
            default: created_at
          description: Sort field
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort order
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
          description: Items per page
      responses:
        '200':
          description: Paginated list of torrents
          content:
            application/json:
              schema:
                type: object
                properties:
                  torrents:
                    type: array
                    items:
                      $ref: '#/components/schemas/Torrent'
                  total:
                    type: integer
                    format: int64
                  page:
                    type: integer
                  per_page:
                    type: integer
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/torrents/{id}:
    get:
      operationId: getTorrent
      summary: Get torrent details
      tags: [torrents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Torrent details
          content:
            application/json:
              schema:
                type: object
                properties:
                  torrent:
                    $ref: '#/components/schemas/Torrent'
        '400':
          description: Invalid torrent ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Torrent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      operationId: editTorrent
      summary: Edit torrent metadata
      description: |
        Update torrent fields. Only the torrent owner or an admin (group_id=1) may edit.
        Staff-only fields (banned, free) are rejected for non-admin users.
      tags: [torrents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditTorrentRequest'
      responses:
        '200':
          description: Updated torrent
          content:
            application/json:
              schema:
                type: object
                properties:
                  torrent:
                    $ref: '#/components/schemas/Torrent'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — not owner or admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Torrent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      operationId: deleteTorrent
      summary: Delete a torrent
      description: |
        Delete a torrent and its stored .torrent file.
        Only the torrent owner or an admin (group_id=1) may delete.
        A reason is required.
      tags: [torrents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteTorrentRequest'
      responses:
        '204':
          description: Torrent deleted successfully
        '400':
          description: Invalid request or missing reason
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — not owner or admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Torrent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/torrents/{id}/download:
    get:
      operationId: downloadTorrent
      summary: Download .torrent file with personalized announce URL
      tags: [torrents]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: The .torrent file
          content:
            application/x-bittorrent:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid torrent ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Torrent not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports:
    post:
      operationId: createReport
      summary: Submit a report
      description: |
        Submit a report about a torrent. One report per user per torrent is enforced.
        Requires authentication.
      tags: [reports]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReportRequest'
      responses:
        '201':
          description: Report submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  report:
                    $ref: '#/components/schemas/Report'
        '400':
          description: Invalid request (missing reason)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate report (already reported this item)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listReports
      summary: List reports (admin only)
      description: |
        Returns a paginated list of reports. Only accessible by administrators (group_id=1).
      tags: [reports]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, resolved]
          description: Filter by report status
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number
        - name: per_page
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
          description: Items per page
      responses:
        '200':
          description: Paginated list of reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      $ref: '#/components/schemas/Report'
                  total:
                    type: integer
                    format: int64
                  page:
                    type: integer
                  per_page:
                    type: integer
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — administrator access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/reports/{id}/resolve:
    put:
      operationId: resolveReport
      summary: Resolve a report (admin only)
      description: |
        Marks a report as resolved. Only accessible by administrators (group_id=1).
      tags: [reports]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Report resolved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid report ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden — administrator access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Access token obtained from login or register

  schemas:
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
          pattern: '^[a-zA-Z0-9_]+$'
          example: johndoe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 8
          maxLength: 1024
          example: mysecurepassword

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: johndoe
        password:
          type: string
          example: mysecurepassword

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: abc123def456...

    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
          description: 64-character hex token, expires in 1 hour
        refresh_token:
          type: string
          description: 64-character hex token, expires in 30 days
        expires_in:
          type: integer
          description: Seconds until access token expires
          example: 3600

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserProfile'
        tokens:
          $ref: '#/components/schemas/AuthTokens'

    PublicProfile:
      type: object
      description: Profile visible to any authenticated user
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        group_id:
          type: integer
          format: int64
        avatar:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        info:
          type: string
          nullable: true
          description: User bio
        uploaded:
          type: integer
          format: int64
        downloaded:
          type: integer
          format: int64
        ratio:
          type: number
          format: double
          description: "uploaded / downloaded (Infinity if downloaded=0 and uploaded>0, 0 if both zero)"
        donor:
          type: boolean
        created_at:
          type: string
          format: date-time

    OwnerProfile:
      description: Extended profile visible only to the profile owner
      allOf:
        - $ref: '#/components/schemas/PublicProfile'
        - type: object
          properties:
            email:
              type: string
              format: email
            passkey:
              type: string
              description: "Masked passkey (first 4 + last 4 chars visible)"
              example: "a1b2************************c5d6"
