##############################################################################
# TorrentTrader — Portainer Stack
#
# Deploy as a stack in Portainer. All environment variables should be
# configured in Portainer's stack environment variables or via stack.env.
#
# Required variables (no defaults — you MUST set these):
#   POSTGRES_PASSWORD, JWT_SECRET, MINIO_ROOT_PASSWORD, S3_SECRET_KEY
#
# See stack.env.example for all available variables with documentation.
#
# Image tag defaults to "latest" — override with IMAGE_TAG for versioned deploys.
##############################################################################

services:
  backend:
    image: williamokano/torrenttrader-backend:${IMAGE_TAG:-latest}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      # Server
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      LOG_LEVEL: "${LOG_LEVEL:-info}"

      # Database (connects to the postgres service)
      DATABASE_URL: "postgres://${POSTGRES_USER:-torrenttrader}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-torrenttrader}?sslmode=disable"
      DB_MAX_OPEN_CONNS: "${DB_MAX_OPEN_CONNS:-25}"
      DB_MAX_IDLE_CONNS: "${DB_MAX_IDLE_CONNS:-5}"
      DB_CONN_MAX_LIFETIME: "${DB_CONN_MAX_LIFETIME:-5m}"

      # Redis (connects to the redis service)
      REDIS_URL: "redis://redis:6379/0"

      # Sessions
      SESSION_STORE: "${SESSION_STORE:-redis}"
      ACCESS_TOKEN_TTL: "${ACCESS_TOKEN_TTL:-1h}"
      REFRESH_TOKEN_TTL: "${REFRESH_TOKEN_TTL:-720h}"

      # JWT
      JWT_SECRET: "${JWT_SECRET}"

      # Storage (S3/MinIO)
      STORAGE_TYPE: "${STORAGE_TYPE:-s3}"
      S3_ENDPOINT: "minio:9000"
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-minioadmin}"
      S3_SECRET_KEY: "${S3_SECRET_KEY}"
      S3_BUCKET: "${S3_BUCKET:-torrenttrader}"
      S3_USE_SSL: "false"

      # SMTP
      SMTP_HOST: "${SMTP_HOST:-mailpit}"
      SMTP_PORT: "${SMTP_PORT:-1025}"
      SMTP_FROM: "${SMTP_FROM:-noreply@torrenttrader.local}"

      # Site
      SITE_NAME: "${SITE_NAME:-TorrentTrader}"
      SITE_DESCRIPTION: "${SITE_DESCRIPTION:-Private BitTorrent Tracker}"
      SITE_BASE_URL: "${SITE_BASE_URL:-http://localhost:3000}"
      API_URL: "${API_URL:-http://localhost:8080}"

      # Tracker
      TRACKER_ANNOUNCE_INTERVAL: "${TRACKER_ANNOUNCE_INTERVAL:-1800}"
      TRACKER_MIN_INTERVAL: "${TRACKER_MIN_INTERVAL:-900}"
      TRACKER_MAX_PEERS: "${TRACKER_MAX_PEERS:-50}"

      # Worker
      ENABLE_SCHEDULER: "${ENABLE_SCHEDULER:-true}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - torrenttrader
    restart: unless-stopped

  frontend:
    image: williamokano/torrenttrader-frontend:${IMAGE_TAG:-latest}
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    environment:
      API_URL: "${API_URL:-http://localhost:8080}"
      SITE_NAME: "${SITE_NAME:-TorrentTrader}"
    networks:
      - torrenttrader
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-torrenttrader}
      POSTGRES_USER: ${POSTGRES_USER:-torrenttrader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-torrenttrader} -d ${POSTGRES_DB:-torrenttrader}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - torrenttrader
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - torrenttrader
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - torrenttrader
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD};
      mc mb local/$${S3_BUCKET:-torrenttrader} --ignore-existing;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-torrenttrader}
    networks:
      - torrenttrader

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  torrenttrader:
    driver: bridge
