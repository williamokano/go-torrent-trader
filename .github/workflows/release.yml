name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-docker-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [backend, frontend, migration-tool]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/torrenttrader-${{ matrix.project }}
          tags: |
            type=match,pattern=v(.*),group=1,value=${{ env.RELEASE_TAG }}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.project }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - project: backend
            binary: torrenttrader-server
            source: ./cmd/server
            os: linux
            arch: amd64
          - project: backend
            binary: torrenttrader-server
            source: ./cmd/server
            os: linux
            arch: arm64
          - project: backend
            binary: torrenttrader-server
            source: ./cmd/server
            os: windows
            arch: amd64
          - project: backend
            binary: torrenttrader-server
            source: ./cmd/server
            os: darwin
            arch: arm64
          - project: migration-tool
            binary: torrenttrader-migrate
            source: ./cmd/migrate
            os: linux
            arch: amd64
          - project: migration-tool
            binary: torrenttrader-migrate
            source: ./cmd/migrate
            os: linux
            arch: arm64
          - project: migration-tool
            binary: torrenttrader-migrate
            source: ./cmd/migrate
            os: windows
            arch: amd64
          - project: migration-tool
            binary: torrenttrader-migrate
            source: ./cmd/migrate
            os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: ${{ matrix.project }}/go.sum

      - name: Extract version
        id: version
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          SUFFIX=""
          if [ "${{ matrix.os }}" = "windows" ]; then SUFFIX=".exe"; fi
          cd ${{ matrix.project }}
          go build -ldflags="-s -w" -o "../dist/${{ matrix.binary }}${SUFFIX}" ${{ matrix.source }}

      - name: Package archive
        id: archive
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARCHIVE_BASE="${{ matrix.binary }}-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}"

          cd dist
          if [ "${{ matrix.os }}" = "windows" ]; then
            zip "../${ARCHIVE_BASE}.zip" *
            echo "FILE=${ARCHIVE_BASE}.zip" >> "$GITHUB_OUTPUT"
          else
            tar czf "../${ARCHIVE_BASE}.tar.gz" *
            echo "FILE=${ARCHIVE_BASE}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.binary }}-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ steps.archive.outputs.FILE }}

  build-frontend-archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Extract version
        id: version
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Package frontend archive
        id: archive
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARCHIVE_NAME="torrenttrader-frontend-${VERSION}.tar.gz"
          tar czf "${ARCHIVE_NAME}" -C frontend dist nginx.conf docker-entrypoint.sh
          echo "FILE=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-frontend
          path: ${{ steps.archive.outputs.FILE }}

  upload-release-assets:
    runs-on: ubuntu-latest
    needs: [build-binaries, build-frontend-archive]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          ls -la
          gh release upload "${TAG}" --clobber *.tar.gz *.zip || echo "No release found for ${TAG}, skipping asset upload"
